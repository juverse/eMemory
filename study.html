<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="eMemory – Study" />
    <meta name="theme-color" content="#4a90e2" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
    <title>eMemory – Study</title>
  </head>
  <body>
    <header>
      <a href="index.html" class="header-back-btn" aria-label="Go back">←</a>
      <h1 id="deck-title">Study</h1>
    </header>

    <main class="study-main">

      <!-- Loading state -->
      <div id="study-loading" class="study-info-screen">
        <p>Loading deck…</p>
      </div>

      <!-- All-done / no-cards-due screen -->
      <div id="study-done" class="study-info-screen study-done" style="display:none">
        <div class="study-done-icon">🎉</div>
        <h2>Fertig!</h2>
        <p id="study-done-msg">Du hast alle fälligen Karten gelernt.</p>
        <a href="index.html" class="study-back-link">← Zurück zu den Decks</a>
      </div>

      <!-- Active study session -->
      <div id="study-session" class="study-session" style="display:none">

        <!-- Progress bar -->
        <div class="study-progress-row" aria-label="Learning progress">
          <span id="progress-text" class="study-progress-text">0 / 0</span>
          <div class="study-progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
            <div class="study-progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <!-- Flashcard display -->
        <div class="study-card" id="study-card" aria-label="Flashcard">
          <div class="study-card-front" id="card-front" aria-label="Card front"></div>
          <div class="study-card-sep" aria-hidden="true"></div>
          <div class="study-card-back" id="card-back" aria-label="Card back"></div>
        </div>

        <!-- Conversation log -->
        <div
          class="study-chat"
          id="study-chat"
          role="log"
          aria-live="polite"
          aria-label="Learning conversation"
        ></div>

        <!-- Status indicator (thinking / listening) -->
        <div
          class="study-status"
          id="study-status"
          role="status"
          aria-live="assertive"
        ></div>

        <!-- Input row -->
        <div class="study-input-row">
          <button
            type="button"
            class="study-voice-btn"
            id="voice-btn"
            aria-label="Press to speak"
            title="Press to speak"
            disabled
          >🎤</button>
          <input
            type="text"
            class="study-text-input"
            id="text-input"
            placeholder="Waiting…"
            aria-label="Your response"
            disabled
          />
          <button
            type="button"
            class="study-send-btn"
            id="send-btn"
            aria-label="Send message"
            title="Send"
            disabled
          >➤</button>
        </div>

      </div><!-- /study-session -->
    </main>

    <script src="app.js"></script>
    <script src="study.js"></script>
  </body>
</html>
